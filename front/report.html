<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="api-base-url" content="https://harmo-training-api.lily-tech.net">
  <title>パルスハーモナイザーレポート：レポート作成</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
      background: #f2f8fc;
      color: #143046;
    }
    main {
      width: min(900px, 92vw);
      margin: 24px auto;
      padding: 24px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(13, 47, 74, 0.1);
    }
    h1 {
      margin-top: 0;
      font-size: 1.5rem;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .menu-link {
      background: #e4edf3;
      color: #123349;
      border-radius: 8px;
      padding: 8px 12px;
      text-decoration: none;
      font-size: 0.95rem;
    }
    #logoutBtn {
      background: #e4edf3;
      color: #123349;
      width: auto;
      padding: 8px 12px;
    }
    .field {
      margin-top: 14px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.95rem;
      font-weight: 600;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #bfd2df;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 1rem;
    }
    .prefixed-input {
      display: flex;
      align-items: center;
      border: 1px solid #bfd2df;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    .prefixed-input span {
      padding: 10px 12px;
      background: #eef4f8;
      border-right: 1px solid #bfd2df;
      font-weight: 600;
      color: #123349;
      white-space: nowrap;
    }
    .prefixed-input input {
      border: 0;
      border-radius: 0;
      width: auto;
      flex: 1;
    }
    .prefixed-input input:focus {
      outline: none;
    }
    textarea {
      min-height: 96px;
      resize: vertical;
    }
    .inline {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .inline input[type="checkbox"] {
      width: auto;
      margin: 0;
    }
    .parts-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
    }
    #partsContainer {
      margin-top: 10px;
      display: grid;
      gap: 10px;
    }
    .part-row {
      display: grid;
      grid-template-columns: 2fr 1fr auto;
      gap: 8px;
      align-items: end;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    #addPartBtn {
      background: #0b74b6;
      color: #fff;
    }
    .remove-part {
      background: #dde8ef;
      color: #123349;
      padding: 10px;
    }
    .submit-wrap {
      margin-top: 20px;
    }
    .message {
      min-height: 1.2em;
      margin-top: 12px;
      font-size: 0.9rem;
      color: #b00020;
    }
    #submitBtn {
      width: 100%;
      background: #0a7a22;
      color: #fff;
    }
    @media (max-width: 640px) {
      .part-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="header-row">
      <h1>レポート内容入力</h1>
      <div class="header-actions">
        <a class="menu-link" href="./home.html">メニューへ</a>
        <button id="logoutBtn" type="button">ログアウト</button>
      </div>
    </div>
    <form id="reportForm" novalidate>
      <div class="field">
        <label for="customerName">顧客名</label>
        <input id="customerName" name="customerName" type="text" required>
      </div>

      <div class="field">
        <label for="address">住所</label>
        <textarea id="address" name="address" required></textarea>
      </div>

      <div class="field">
        <label for="serialNumber">シリアル番号</label>
        <div class="prefixed-input">
          <span>PH-</span>
          <input id="serialNumber" name="serialNumber" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="6桁の数値を入力" required>
        </div>
      </div>

      <div class="field">
        <label for="workType">作業内容</label>
        <select id="workType" name="workType" required>
          <option value="">選択してください</option>
          <option value="調整">調整</option>
          <option value="部品交換">部品交換</option>
          <option value="点検">点検</option>
          <option value="その他">その他</option>
        </select>
      </div>

      <div class="field">
        <label>フォルト情報</label>
        <div class="inline">
          <input id="hasFaultInfo" name="hasFaultInfo" type="checkbox">
          <span>フォルト情報あり</span>
        </div>
        <input id="faultInfoDetail" name="faultInfoDetail" type="text" placeholder="フォルト情報を入力" disabled>
      </div>

      <div class="parts-header">
        <label>部品交換</label>
        <button type="button" id="addPartBtn">行を追加</button>
      </div>
      <div id="partsContainer"></div>

      <div class="field">
        <label for="workHours">作業時間</label>
        <input id="workHours" name="workHours" type="number" min="0" step="0.1" placeholder="例: 2.5" required>
      </div>

      <div class="submit-wrap">
        <button id="submitBtn" type="submit">保存</button>
        <p id="message" class="message" aria-live="polite"></p>
      </div>
    </form>
  </main>

  <script src="./report.js" defer></script>
</body>
</html>
