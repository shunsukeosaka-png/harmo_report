<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レポート入力</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
      background: #f2f8fc;
      color: #143046;
    }
    main {
      width: min(900px, 92vw);
      margin: 24px auto;
      padding: 24px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(13, 47, 74, 0.1);
    }
    h1 {
      margin-top: 0;
      font-size: 1.5rem;
    }
    .field {
      margin-top: 14px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.95rem;
      font-weight: 600;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #bfd2df;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 1rem;
    }
    textarea {
      min-height: 96px;
      resize: vertical;
    }
    .inline {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .inline input[type="checkbox"] {
      width: auto;
      margin: 0;
    }
    .parts-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
    }
    #partsContainer {
      margin-top: 10px;
      display: grid;
      gap: 10px;
    }
    .part-row {
      display: grid;
      grid-template-columns: 2fr 1fr auto;
      gap: 8px;
      align-items: end;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    #addPartBtn {
      background: #0b74b6;
      color: #fff;
    }
    .remove-part {
      background: #dde8ef;
      color: #123349;
      padding: 10px;
    }
    .submit-wrap {
      margin-top: 20px;
    }
    #submitBtn {
      width: 100%;
      background: #0a7a22;
      color: #fff;
    }
    @media (max-width: 640px) {
      .part-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>レポート内容入力</h1>
    <form id="reportForm" novalidate>
      <div class="field">
        <label for="customerName">顧客名</label>
        <input id="customerName" name="customerName" type="text" required>
      </div>

      <div class="field">
        <label for="address">住所</label>
        <textarea id="address" name="address" required></textarea>
      </div>

      <div class="field">
        <label for="serialNumber">シリアル番号</label>
        <input id="serialNumber" name="serialNumber" type="text" required>
      </div>

      <div class="field">
        <label for="workType">作業内容</label>
        <select id="workType" name="workType" required>
          <option value="">選択してください</option>
          <option value="調整">調整</option>
          <option value="部品交換">部品交換</option>
          <option value="点検">点検</option>
          <option value="その他">その他</option>
        </select>
      </div>

      <div class="field">
        <label>フォルトコード</label>
        <div class="inline">
          <input id="hasFaultCode" name="hasFaultCode" type="checkbox">
          <span>フォルトコードあり</span>
        </div>
        <input id="faultCodeDetail" name="faultCodeDetail" type="text" placeholder="フォルトコード内容を入力" disabled>
      </div>

      <div class="parts-header">
        <label>部品交換</label>
        <button type="button" id="addPartBtn">行を追加</button>
      </div>
      <div id="partsContainer"></div>

      <div class="field">
        <label for="workHours">作業時間</label>
        <input id="workHours" name="workHours" type="text" placeholder="例: 2時間30分" required>
      </div>

      <div class="submit-wrap">
        <button id="submitBtn" type="submit">保存（仮）</button>
      </div>
    </form>
  </main>

  <script src="./report.js" defer></script>
</body>
</html>
