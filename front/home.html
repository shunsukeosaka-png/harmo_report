<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="api-base-url" content="https://harmo-training-api.lily-tech.net">
  <title>パルスハーモナイザーレポート：メニュー</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
      background: linear-gradient(135deg, #e6f5ff, #f7fbff);
      color: #143046;
    }
    main {
      width: min(760px, 92vw);
      padding: 24px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(13, 47, 74, 0.1);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    .user-meta {
      margin: 8px 0 20px;
      font-size: 0.95rem;
      color: #355268;
    }
    .actions {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .action-link {
      display: block;
      text-decoration: none;
      padding: 16px;
      border-radius: 10px;
      border: 1px solid #c4d8e5;
      background: #f8fcff;
      color: #123349;
      font-weight: 600;
    }
    .action-link:hover {
      background: #eef7ff;
    }
    .action-link.is-disabled {
      background: #edf2f6;
      border-color: #d3dbe4;
      color: #8a98a6;
      pointer-events: none;
      cursor: not-allowed;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.95rem;
      cursor: pointer;
      background: #e4edf3;
      color: #123349;
    }
    @media (max-width: 640px) {
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="header">
      <h1>メニュー</h1>
      <button id="logoutBtn" type="button">ログアウト</button>
    </div>
    <p id="userMeta" class="user-meta">ユーザー情報を確認中...</p>

    <div class="actions">
      <a class="action-link" href="./reports_list.html">レポート一覧</a>
      <a id="reportEntryLink" class="action-link" href="./report.html">レポート記入ページ</a>
    </div>
  </main>

  <script src="./home.js" defer></script>
</body>
</html>
